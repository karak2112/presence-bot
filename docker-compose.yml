services:
  bot:
    build: .
    container_name: twitch-presence-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    shm_size: "2gb"
    mem_limit: 1536m
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    command: ["python", "-m", "src.main", "run"]
